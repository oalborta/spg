<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a73e8">
    <title>Programación Deportiva</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="navbar-top">
            <h1>Programación Deportiva</h1>
            <div class="btn-group">
                <button onclick="cargarDatos()" id="btnRecargar" class="btn-action">↻ Recargar</button>
                <button onclick="compartirApp()" class="btn-action">↗ Compartir</button>
            </div>
        </div>
        <p class="texto-legal">Programación sujeta a cambios</p>
    </header>
    <main>
        <section id="ahora" class="bloque">
            <h2>En vivo</h2>
            <div class="lista"></div>
        </section>
        <section id="hoy" class="bloque">
            <h2>Hoy</h2>
            <div class="lista"></div>
        </section>
        <section id="proximos" class="bloque">
            <h2>Próximos eventos</h2>
            <div class="lista"></div>
        </section>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
